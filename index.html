<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Corpus Thèse - Sacralisation du Désert</title>
    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">

    <style>
        /* Configuration typographique demandée */
        body { 
            font-family: 'Times New Roman', Times, serif; 
            font-size: 11pt; 
            margin: 30px; 
            background-color: #fdfdfd; 
            color: #1a1a1a;
            line-height: 1.5;
        }

        h1 { 
            background-color: rgba(0, 0, 139, 0.5); /* Bleu foncé 50% transparent */
            padding: 25px; 
            text-align: center; 
            color: white;
            border-radius: 4px;
            font-variant: small-caps;
            font-size: 2em;
            margin-bottom: 30px;
        }

        /* Ajustement du tableau pour éviter la largeur excessive */
        .container { max-width: 100%; margin: auto; }
        
        table.dataTable { 
            border-bottom: 2px solid darkblue !important; 
            width: 100% !important;
        }

        /* Titres de colonnes centralisés */
        table.dataTable thead th { 
            background-color: #f0f0f5; 
            text-align: center !important; 
            font-weight: bold;
            border-bottom: 1px solid darkblue;
            padding: 12px;
        }

        /* Cellules justifiées avec retour à la ligne automatique */
        table.dataTable tbody td { 
            text-align: justify; 
            vertical-align: middle;
            padding: 12px 10px;
            white-space: normal !important; /* Force le retour à la ligne */
            word-wrap: break-word;
        }

        /* Style de la fiche qui s'ouvre au clic (Détails) */
        .dtr-details { 
            width: 100%; 
            background-color: #f9f9f9; 
            padding: 20px; 
        }
        
        .dtr-details li { 
            border-bottom: 1px solid #ddd; 
            padding: 10px 0;
            display: flex !important;
            flex-direction: row;
        }

        .dtr-title { 
            font-weight: bold; 
            color: darkblue; 
            min-width: 200px; /* Aligne les titres de la fiche */
            text-transform: uppercase;
            font-size: 0.85em;
        }

        .dtr-data { 
            text-align: justify; 
            flex-grow: 1;
            padding-left: 20px;
        }

        /* Icône de clic plus discrète */
        table.dataTable.dtr-inline.collapsed > tbody > tr > td.dtr-control:before {
            background-color: darkblue !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Inventaire Systématique du Corpus</h1>
        
        <table id="corpusTable" class="display responsive nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>Nom du document</th>
                    <th>Catégorie</th>
                    <th>Site</th>
                    <th>Dynastie / Roi</th>
                    <th>Divinités</th>
                    <th>Sacralisation</th>
                    <th>Épithètes</th>
                    <th>Lexique "Désert"</th>
                    <th>Titres de particuliers</th>
                    <th>Iconographie</th>
                    <th>Type d'écriture</th>
                    <th>Répertoire textuel</th>
                    <th>Bibliographie</th>
                    <th>Commentaire</th>
                </tr>
            </thead>
        </table>
    </div>

    <script>
        Papa.parse("Tableau Master.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                $('#corpusTable').DataTable({
                    data: results.data,
                    columns: [
                        { data: "Nom", defaultContent: "—" },
                        { data: "Catégorie", defaultContent: "—" },
                        { data: "Site", defaultContent: "—" },
                        { 
                            data: null, 
                            render: function(data) { 
                                return (data.Dynastie || "") + " " + (data.Roi || ""); 
                            }
                        },
                        { data: "Divinités", defaultContent: "—" },
                        { data: "Type de sacralisation", defaultContent: "—" },
                        { data: "Épithètes", defaultContent: "—" },
                        { data: "Lexique \"Désert\"", defaultContent: "—" },
                        { data: "Titres de particuliers", defaultContent: "—" },
                        { data: "Iconographie", defaultContent: "—" },
                        { data: "Type d'écriture", defaultContent: "—" },
                        { data: "Répertoire textuel", defaultContent: "—" },
                        { data: "Bibliographie", defaultContent: "—" },
                        { data: "Commentaire", defaultContent: "—" }
                    ],
                    responsive: {
                        details: {
                            type: 'column',
                            target: 0 // Le clic se fait sur la première colonne (Nom)
                        }
                    },
                    columnDefs: [
                        { className: 'dtr-control', targets: 0 },
                        { responsivePriority: 1, targets: 0 }, // Nom toujours visible
                        { responsivePriority: 2, targets: 2 }, // Site toujours visible
                        { targets: [6, 7, 8, 9, 10, 11, 12, 13], visible: false } // Masqués pour réduire la largeur
                    ],
                    language: {
                        url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/fr-FR.json'
                    },
                    pageLength: 25,
                    dom: 'frtip'
                });
            }
        });
    </script>
</body>
</html>
