<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Corpus Thèse - Sacralisation du Désert</title>
    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">

    <style>
        body { 
            font-family: 'Times New Roman', Times, serif; 
            font-size: 11pt; 
            margin: 30px; 
            background-color: #fdfdfd; 
            color: #222;
            line-height: 1.5;
        }
        h1 { 
            background-color: rgba(0, 0, 139, 0.5); 
            padding: 20px; 
            text-align: center; 
            color: white;
            border-radius: 4px;
            font-variant: small-caps;
        }
        .container { max-width: 100%; margin: auto; }
        
        /* Force le retour à la ligne pour réduire la largeur horizontale */
        table.dataTable td { 
            white-space: normal !important; 
            word-wrap: break-word;
            vertical-align: top;
            text-align: justify;
            padding: 12px 8px;
        }
        
        table.dataTable thead th { 
            background-color: #f0f0f5; 
            text-align: center !important; 
            font-weight: bold;
            border-bottom: 1px solid darkblue;
        }

        /* Style de la fiche déployée (Accordion) */
        .dtr-details { width: 100%; }
        .dtr-details li { 
            border-bottom: 1px solid #e0e0e0; 
            padding: 8px 0; 
            display: flex;
            flex-direction: column;
        }
        .dtr-title { 
            font-weight: bold; 
            color: darkblue; 
            margin-bottom: 4px;
            text-transform: uppercase;
            font-size: 0.9em;
        }
        .dtr-data { padding-left: 10px; text-align: justify; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Inventaire Systématique du Corpus</h1>
        
        <table id="corpusTable" class="display responsive" style="width:100%">
            <thead>
                <tr>
                    <th>Nom du document</th>
                    <th>Catégorie</th>
                    <th>Site</th>
                    <th>Dynastie / Roi</th>
                    <th>Divinités</th>
                    <th>Sacralisation</th>
                    <th>Épithètes</th>
                    <th>Lexique "Désert"</th>
                    <th>Titres</th>
                    <th>Iconographie</th>
                    <th>Écriture</th>
                    <th>Répertoire textuel</th>
                    <th>Bibliographie</th>
                    <th>Commentaire</th>
                </tr>
            </thead>
        </table>
    </div>

    <script>
        Papa.parse("Tableau-Master.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                $('#corpusTable').DataTable({
                    data: results.data,
                    columns: [
                        { data: "Nom", defaultContent: "" },
                        { data: "Catégorie", defaultContent: "" },
                        { data: "Site", defaultContent: "" },
                        { 
                            data: null, 
                            render: function(data) { return (data.Dynastie || "") + " " + (data.Roi || ""); }
                        },
                        { data: "Divinités", defaultContent: "" },
                        { data: "Type de sacralisation", defaultContent: "–" },
                        { data: "Épithètes", defaultContent: "" },
                        { data: "Lexique \"Désert\"", defaultContent: "" },
                        { data: "Titres de particuliers", defaultContent: "" },
                        { data: "Iconographie", defaultContent: "" },
                        { data: "Type d'écriture", defaultContent: "" },
                        { data: "Répertoire textuel", defaultContent: "" },
                        { data: "Bibliographie", defaultContent: "" },
                        { data: "Commentaire", defaultContent: "" }
                    ],
                    responsive: {
                        details: {
                            display: $.fn.dataTable.Responsive.display.childRowImmediate,
                            type: 'none',
                            target: ''
                        }
                    },
                    // On définit quelles colonnes sont visibles immédiatement (0 à 5)
                    columnDefs: [
                        { responsivePriority: 1, targets: 0 },
                        { responsivePriority: 2, targets: 2 },
                        { targets: [6, 7, 8, 9, 10, 11, 12, 13], visible: false } 
                    ],
                    language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/fr-FR.json' },
                    pageLength: 25
                });
            }
        });
    </script>
</body>
</html>
